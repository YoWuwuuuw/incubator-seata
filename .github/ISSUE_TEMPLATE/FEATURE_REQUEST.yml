name: Feature Request
about: Suggest an idea for Seata
body:
  - type: markdown
    attributes:
      value: |
        - type: textarea
    id: why-you-need-it
    attributes:
      label: Why you need it?
      description: Is your feature request related to a problem? Please describe in detail.
    validations:
      required: true
  - type: textarea
    id: how-it-could-be
    attributes:
      label: How it could be?
      description: A clear and concise description of what you want to happen. You can explain more about the input of the feature and its output.
    validations:
      required: true
  - type: textarea
    id: other-related-information
    attributes:
      label: Other related information
      description: Add any other context or screenshots about the feature request here.
